name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync plugin version in source
        run: |
          VER="${{ steps.ver.outputs.version }}"
          sed -i "s/Version:.*/Version:      ${VER}/" paxdesign-toolbar/paxdesign-toolbar.php
          sed -i "s/define( 'PDX_VERSION'.*/define( 'PDX_VERSION',   '${VER}' );/" paxdesign-toolbar/paxdesign-toolbar.php

      - name: Build and verify release ZIP
        run: |
          chmod +x scripts/build-release.sh scripts/verify-wp-plugin-zip.sh
          bash scripts/build-release.sh

      - name: Simulate WordPress plugin detection
        run: |
          VER="${{ steps.ver.outputs.version }}"
          php scripts/simulate-wp-plugin-detect.php "releases/paxdesign-toolbar-${VER}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            releases/paxdesign-toolbar-${{ steps.ver.outputs.version }}.zip
            releases/paxdesign-toolbar-${{ steps.ver.outputs.version }}.zip.sha256
          generate_release_notes: true
